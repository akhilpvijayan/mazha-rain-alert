name: KSDMA Rainfall Scraper

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:         # lets you manually trigger a run from GitHub's UI

permissions:
  contents: write            # needed so the workflow can commit updated files back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ksdma_scraper.py

      - name: Commit updated files
        run: |
          git config user.name "ksdma-bot"
          git config user.email "bot@users.noreply.github.com"
          git add district_colors.json last_state.json
          git commit -m "Update alert data $(date -u)" || echo "No changes to commit"
          git push
